name: httpx
category: Recon
description: HTTP Toolkit for probing
binary: httpx
profiles:
  - name: Title & Status
    args: ["-u", "{{TARGET}}", "-title", "-status-code", "-silent"]
  - name: Tech Detect
    args: ["-u", "{{TARGET}}", "-title", "-status-code", "-tech-detect", "-silent"]
  - name: Full Recon
    args: ["-u", "{{TARGET}}", "-title", "-status-code", "-tech-detect", "-server", "-content-length", "-follow-redirects", "-silent"]
  - name: Screenshot
    args: ["-u", "{{TARGET}}", "-screenshot", "-silent"]
parsers:
  - type: service
    regex: '(https?://[^\s\[\x1b]+)'
